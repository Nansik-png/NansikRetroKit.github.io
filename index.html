<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title><span style="color:blue">Nansik Retro Kit</span></title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-white text-black font-sans">

  <!-- Header -->
  <header class="flex justify-between items-center px-8 py-4 border-b">
    <h1 class="text-xl tracking-widest font-semibold"><span style="color:blue">Nansik Retro Kit</span></h1>
    <nav class="space-x-6 text-sm">
      <a href="#" class="hover:underline">Shop</a>
      <a href="#" class="hover:underline">About</a>
      <a href="#" class="hover:underline">Contact</a>
    </nav>
  </header>

  <!-- Hero -->
  <section class="h-[80vh] flex flex-col justify-center items-center text-center">
    <h2 class="text-5xl font-bold mb-4"><span style="color:blue">SPRING DROP</span></h2>
    <p class="text-gray-600 mb-6"><span style="color:blue">Limited Pieces Available</span></p>
    <button class="border px-6 py-2 hover:bg-black hover:text-white transition">Shop Now</button>
  </section>

  <!-- Products -->
  <section class="px-8 py-12">
    <div class="grid grid-cols-1 md:grid-cols-3 gap-8 max-w-6xl mx-auto">

      <div class="group">
        <img src="https://via.placeholder.com/300" class="w-full mb-3 rounded-2xl shadow">
        <p class="font-medium"><span style="color:blue">C.Ronaldo Sporting 02-03</span></p>
        <button class="mt-2 border px-4 py-2 text-sm group-hover:bg-black group-hover:text-white transition">Buy</button>
      </div>

      <div class="group">
        <img src="https://via.placeholder.com/300" class="w-full mb-3 rounded-2xl shadow">
        <p class="font-medium"><span style="color:blue">Juventus 97-98</span></p>
        <button class="mt-2 border px-4 py-2 text-sm group-hover:bg-black group-hover:text-white transition">Buy</button>
      </div>

      <div class="group">
        <img src="https://via.placeholder.com/300" class="w-full mb-3 rounded-2xl shadow">
        <p class="font-medium"><span style="color:blue">Juventus Pink</span></p>
        <button class="mt-2 border px-4 py-2 text-sm group-hover:bg-black group-hover:text-white transition">Buy</button>
      </div>

    </div>
  </section>

  <!-- Footer -->
  <footer class="border-t py-6 text-center text-sm text-gray-500">
    © <span style="color:blue">2026 Nansik Retro Kit</span>. All rights reserved.
  </footer>

</body>
</html>

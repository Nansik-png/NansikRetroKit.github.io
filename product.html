<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Product - Nansik Retro Kit</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body class="theme">

  <!-- Header -->
  <header class="site-header">
    <span class="site-tagline">(retro football kits)</span>
    <h1 class="site-wordmark">NANSIK RETRO KITS</h1>
    <nav class="site-nav">
      <a href="shop.html">Shop</a>
      <a href="about.html">About</a>
      <a href="cart.html" class="nav-cart">Cart (<span data-cart-count>0</span>)</a>
    </nav>
  </header>

  <!-- Product layout -->
  <section class="product-wrap">

    <!-- Image slider -->
    <div class="product-image-frame relative w-full">
      <img id="mainImage" alt="Product Image">
      <button id="prevBtn" class="absolute left-2 top-1/2 transform -translate-y-1/2 px-3 py-1 hidden">&larr;</button>
      <button id="nextBtn" class="absolute right-2 top-1/2 transform -translate-y-1/2 px-3 py-1 hidden">&rarr;</button>
    </div>

    <!-- Info -->
    <div class="product-info">
      <h2 id="productName"></h2>
      <p id="productDesc" class="desc"></p>

      <button id="addToCart" class="btn btn--solid">Add to Cart</button>
      <p id="cartStatus" class="text-sm mt-3" style="min-height:1.25rem;color:var(--ink-soft)"></p>

      <button id="goToCart" class="btn mt-4 hidden">Go to Cart</button>
    </div>

  </section>

  <!-- Footer -->
  <footer class="site-footer">
    © 2026 Nansik Retro Kit. All rights reserved. Website coded by GitHub: ajversaily.
  </footer>

  <script src="js/store.js"></script>
  <script src="js/main.js"></script>
  <script src="js/theme.js"></script>
</body>
</html>

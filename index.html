<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shop - Nansik Retro Kit</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-white text-black font-sans">

  <!-- Header -->
  <header class="flex justify-between items-center px-8 py-4 border-b">
    <h1 class="text-xl tracking-widest font-semibold">Nansik Retro Kit</h1>
    <nav class="space-x-6 text-sm">
      <a href="index.html" class="hover:underline">Home</a>
      <a href="about.html" class="hover:underline">About</a>
      <a href="#" class="hover:underline">Contact</a>
    </nav>
  </header>

  <!-- Shop Title -->
  <section class="text-center py-10">
    <h2 class="text-2xl tracking-wide">ALL PRODUCTS</h2>
  </section>

  <!-- Products Grid -->
  <section class="px-8 pb-16">
    <div class="grid grid-cols-1 md:grid-cols-3 gap-8 max-w-6xl mx-auto">

      <!-- Product Template -->
      <!-- Product 1: SOLD OUT -->
      <div class="flex flex-col text-center">
        <img src="Photoroom_20250318_152243.JPG" class="w-full h-60 object-cover rounded-2xl shadow">
        <p class="mt-2 text-sm">C.Ronaldo Sporting 02-03</p>
        <p class="text-sm text-gray-500">$39.99</p>
        <p class="text-xs mt-1 text-red-500 font-bold">SOLD OUT</p>
      </div>

      <!-- Product 2: Buyable -->
      <div class="flex flex-col text-center">
        <img src="IMG_3076.jpeg" class="w-full h-60 object-cover rounded-2xl shadow">
        <p class="mt-2 text-sm">KAKA AC Milan 06-07</p>
        <p class="text-sm text-gray-500">$42.99</p>
        <button
          onclick="window.location.href='product.html?name=KAKA%20AC%20Milan%2006-07&image=IMG_3076.jpeg&desc=KAKA%20AC%20Milan%2006-07%20|%20Price:%20$42.99%20|%20Model:%20N/A'"
          class="border border-black text-black px-4 py-2 text-sm mt-2 hover:bg-black hover:text-white transition cursor-pointer">
          Buy
        </button>
      </div>

      <!-- Product 3: Buyable -->
      <div class="flex flex-col text-center">
        <img src="IMG_3079.jpeg" class="w-full h-60 object-cover rounded-2xl shadow">
        <p class="mt-2 text-sm">Juventus Pink</p>
        <p class="text-sm text-gray-500">$29.99</p>
        <button
          onclick="window.location.href='product.html?name=Juventus%20Pink&image=IMG_3079.jpeg&desc=Juventus%20Pink%20|%20Price:%20$29.99%20|%20Model:%20N/A'"
          class="border border-black text-black px-4 py-2 text-sm mt-2 hover:bg-black hover:text-white transition cursor-pointer">
          Buy
        </button>
      </div>

    </div>
  </section>

  <!-- Footer -->
  <footer class="border-t py-6 text-center text-sm text-gray-500">
    © <span class="text-blue-500">2026 Nansik Retro Kit</span>. All rights reserved.
  </footer>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shop - Nansik Retro Kit</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-white text-black font-sans">

  <!-- 🌸 Cherry Blossom Tree (BACKGROUND ELEMENT) -->
  <img src="pngtree-cherry-blossom-tree-spring-plant-flower-petals-png-image_6748513.jpg.png"
       class="fixed bottom-[-80px] left-0 w-[1400px] opacity-60 pointer-events-none z-0">

  <!-- Header -->
  <header class="relative z-10 flex justify-between items-center px-6 py-4">
    <h1 class="text-lg tracking-widest">NRK</h1>
    <a href="index.html" class="text-sm hover:underline">BACK</a>
  </header>

  <!-- Shop Title -->
  <section class="relative z-10 text-center py-10">
    <h2 class="text-2xl tracking-wide">ALL PRODUCTS</h2>
  </section>

  <!-- Products Grid -->
  <section class="relative z-10 px-6 pb-16">
    <div class="grid grid-cols-2 md:grid-cols-4 gap-6 max-w-6xl mx-auto">

      <!-- Product 1: SOLD OUT -->
      <div class="relative group">
        <img src="Photoroom_20250318_152243.JPG" class="w-full h-60 object-cover rounded-2xl shadow">
        <div class="absolute inset-0 bg-black bg-opacity-50 rounded-2xl flex flex-col justify-center items-center">
          <p class="text-white text-lg font-bold mb-2 drop-shadow-lg">C.Ronaldo Sporting 02-03</p>
          <button class="border border-red-500 text-red-500 px-4 py-1 text-sm cursor-not-allowed">
            SOLD OUT
          </button>
        </div>
      </div>

      <!-- Product 2: SOLD OUT -->
      <div class="relative group">
        <img src="Photoroom_20250318_152823.JPG" class="w-full h-60 object-cover rounded-2xl shadow">
        <div class="absolute inset-0 bg-black bg-opacity-50 rounded-2xl flex flex-col justify-center items-center">
          <p class="text-white text-lg font-bold mb-2 drop-shadow-lg">Juventus 97-98</p>
          <button class="border border-red-500 text-red-500 px-4 py-1 text-sm cursor-not-allowed">
            SOLD OUT
          </button>
        </div>
      </div>

      <!-- Product 3: BUYABLE -->
      <div class="relative group">
        <img src="IMG_3079.jpeg" class="w-full h-60 object-cover rounded-2xl shadow">
        <div class="absolute inset-0 flex flex-col justify-center items-center text-center">
          <p class="text-white text-lg font-bold mb-2 drop-shadow-lg">Juventus Pink</p>
          <p class="text-white text-sm mb-2">$29.99</p>
          <button 
            onclick="window.location.href='product.html?name=' + encodeURIComponent('Juventus Pink') + '&image=' + encodeURIComponent('IMG_3079.jpeg') + '&desc=' + encodeURIComponent('Juventus Pink | Price: $29.99 | Model: N/A')"
            class="border border-white text-white px-4 py-1 text-sm hover:bg-white hover:text-black transition">
            Buy
          </button>
        </div>
      </div>

      <!-- Product 4: BUYABLE -->
      <div class="relative group">
        <img src="IMG_3076.jpeg" class="w-full h-60 object-cover rounded-2xl shadow">
        <div class="absolute inset-0 flex flex-col justify-center items-center text-center">
          <p class="text-white text-lg font-bold mb-2 drop-shadow-lg">KAKA AC Milan 06-07</p>
          <p class="text-white text-sm mb-2">$42.99</p>
          <button 
            onclick="window.location.href='product.html?name=' + encodeURIComponent('KAKA AC Milan 06-07') + '&image=' + encodeURIComponent('IMG_3076.jpeg') + '&desc=' + encodeURIComponent('KAKA AC Milan 06-07 | Price: $42.99 | Model: N/A')"
            class="border border-white text-white px-4 py-1 text-sm hover:bg-white hover:text-black transition">
            Buy
          </button>
        </div>
      </div>

    </div>
  </section>

</body>
</html>

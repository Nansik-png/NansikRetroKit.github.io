<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cart - Nansik Retro Kit</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-white text-black font-sans">

  <!-- Header -->
  <header class="flex justify-between items-center px-8 py-4 border-b">
    <h1 class="text-xl tracking-widest font-semibold">CART</h1>
    <a href="shop.html" class="text-sm hover:underline">Back to Shop</a>
  </header>

  <!-- Cart Container -->
  <section class="max-w-4xl mx-auto px-6 py-10">
    <div id="cartContainer" class="space-y-4"></div>

    <!-- Total -->
    <div class="flex justify-between font-bold text-lg mt-6">
      <span>Total:</span>
      <span id="totalPrice">$0.00</span>
    </div>

    <!-- Checkout -->
    <div class="text-center mt-6">
      <button id="checkoutBtn" class="border px-6 py-2 hover:bg-black hover:text-white transition">
        Checkout (DM Instagram)
      </button>
    </div>
  </section>

  <script>
document.getElementById("checkoutBtn").onclick = () => {
  if (cart.length === 0) {
    alert("Your cart is empty!");
    return;
  }

  let message = "Hello! I want to order:\n\n";

  cart.forEach(item => {
    message += `• ${item.name}\n`;
    message += `${item.desc}\n\n`;
  });

  // Add total
  let total = 0;
  cart.forEach(item => {
    const match = item.desc.match(/Price:\s*\$(\d+(\.\d+)?)/);
    if (match) total += parseFloat(match[1]);
  });

  message += `Total: $${total.toFixed(2)}\n\nThank you!`;

  // Copy message to clipboard
  navigator.clipboard.writeText(message);

  alert("Order message copied! Paste it in Instagram DM.");

  // Open Instagram
  window.open("https://www.instagram.com/direct/t/17845319067422620/", "_blank");
};
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Product</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-white text-black font-sans">

  <!-- Header -->
  <header class="flex justify-between items-center px-8 py-4 border-b">
    <h1 class="text-xl tracking-widest font-semibold">NRK</h1>
    <a href="shop.html" class="text-sm">BACK</a>
  </header>

  <!-- Product Layout -->
  <section class="max-w-5xl mx-auto px-6 py-12 grid md:grid-cols-2 gap-10">

    <!-- Image -->
    <img id="productImage" class="w-full rounded-2xl shadow">

    <!-- Info -->
    <div class="flex flex-col justify-center">
      <h2 id="productName" class="text-3xl font-bold mb-4"></h2>
      <p class="text-gray-600 mb-6">
        Premium retro jersey. High quality stitching and perfect for everyday wear or match day.
      </p>

      <!-- Add to Cart -->
      <button id="addToCart" class="border px-6 py-3 font-semibold hover:bg-black hover:text-white transition">
        Add to Cart
      </button>
    </div>

  </section>

  <script>
    const params = new URLSearchParams(window.location.search);
    const name = params.get("name");
    const image = params.get("image");

    document.getElementById("productName").innerText = name;
    document.getElementById("productImage").src = image;

    document.getElementById("addToCart").onclick = function () {
      let cart = JSON.parse(localStorage.getItem("cart")) || [];
      cart.push({ name, image });
      localStorage.setItem("cart", JSON.stringify(cart));
      alert("Added to cart!");
    };
  </script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Product - Nansik Retro Kit</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-white text-black font-sans">

  <!-- Header -->
  <header class="flex justify-between items-center px-8 py-4 border-b">
    <h1 class="text-xl tracking-widest font-semibold">NRK</h1>
    <a href="shop.html" class="text-sm hover:underline">BACK</a>
  </header>

  <!-- Product Layout -->
  <section class="max-w-5xl mx-auto px-6 py-12 grid md:grid-cols-2 gap-10">

    <!-- Image -->
    <img id="productImage" class="w-full rounded-2xl shadow" alt="Product Image">

    <!-- Info -->
    <div class="flex flex-col justify-center">
      <h2 id="productName" class="text-3xl font-bold mb-4"></h2>
      <p id="productDesc" class="text-gray-600 mb-6"></p>

      <!-- Add to Cart -->
      <button id="addToCart" class="border px-6 py-3 font-semibold hover:bg-black hover:text-white transition cursor-pointer">
        Add to Cart
      </button>

      <!-- Go to Cart button (hidden by default) -->
      <button id="goToCart" class="border px-6 py-3 font-semibold mt-4 hover:bg-black hover:text-white transition cursor-pointer hidden">
        Go to Cart
      </button>
    </div>

  </section>

  <script>
    // 1️⃣ Grab URL parameters
    const params = new URLSearchParams(window.location.search);
    const name = params.get("name") ? decodeURIComponent(params.get("name")) : "Unnamed Product";
    const image = params.get("image") ? decodeURIComponent(params.get("image")) : "";
    const desc = params.get("desc") ? decodeURIComponent(params.get("desc")) : "No description available.";

    // 2️⃣ Fill in page content dynamically
    document.getElementById("productName").innerText = name;
    document.getElementById("productImage").src = image;
    document.getElementById("productDesc").innerText = desc;

    // 3️⃣ Add to Cart functionality
    const addToCartBtn = document.getElementById("addToCart");
    const goToCartBtn = document.getElementById("goToCart");

    addToCartBtn.onclick = function () {
      // Load existing cart or start new
      let cart = JSON.parse(localStorage.getItem("cart")) || [];
      cart.push({ name, image, desc });
      localStorage.setItem("cart", JSON.stringify(cart));

      alert(`${name} added to cart!`);
      goToCartBtn.classList.remove("hidden");
    };

    // 4️⃣ Go to cart page
    goToCartBtn.onclick = function () {
      window.location.href = "cart.html";
    };
  </script>

</body>
</html>

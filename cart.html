<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cart - Nansik Retro Kit</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-white text-black font-sans">

  <!-- Header -->
  <header class="flex justify-between items-center px-8 py-4 border-b">
    <h1 class="text-xl tracking-widest font-semibold">CART</h1>
    <a href="shop.html" class="text-sm hover:underline">Back to Shop</a>
  </header>

  <!-- Cart Container -->
  <section class="max-w-4xl mx-auto px-6 py-10">
    <div id="cartContainer" class="space-y-4"></div>

    <!-- Total -->
    <div class="flex justify-between font-bold text-lg mt-6">
      <span>Total:</span>
      <span id="totalPrice">$0.00</span>
    </div>

    <!-- Checkout -->
    <div class="text-center mt-6">
      <button id="checkoutBtn" class="border px-6 py-2 hover:bg-black hover:text-white transition">
        Checkout (DM Instagram)
      </button>
    </div>
  </section>

  <script>
    // Load cart
    let cart = JSON.parse(localStorage.getItem("cart")) || [];
    const container = document.getElementById("cartContainer");
    const totalPriceEl = document.getElementById("totalPrice");

    function calculateTotal(cartItems) {
      let total = 0;
      cartItems.forEach(item => {
        const priceMatch = item.desc.match(/Price:\s*\$(\d+(\.\d+)?)/);
        if (priceMatch) total += parseFloat(priceMatch[1]);
      });
      totalPriceEl.innerText = `$${total.toFixed(2)}`;
    }

    function renderCart() {
      container.innerHTML = "";

      if (cart.length === 0) {
        container.innerHTML = "<p>Your cart is empty.</p>";
        totalPriceEl.innerText = "$0.00";
        return;
      }

      cart.forEach((item, i) => {
        const div = document.createElement("div");
        div.className = "flex items-center gap-4 p-2 border rounded-md";

        // Image
        const img = document.createElement("img");
        img.src = item.image;
        img.className = "w-20 h-20 object-cover rounded";

        // Info
        const info = document.createElement("div");
        info.className = "flex-1";
        info.innerHTML = `<p class="font-semibold">${item.name}</p>
                          <p class="text-gray-500">${item.desc}</p>`;

        // Remove button
        const removeBtn = document.createElement("button");
        removeBtn.className = "border px-2 py-1 text-sm hover:bg-red-500 hover:text-white transition";
        removeBtn.innerText = "Remove";
        removeBtn.onclick = () => {
          cart.splice(i, 1); // remove this item
          localStorage.setItem("cart", JSON.stringify(cart));
          renderCart(); // re-render after removal
        };

        div.appendChild(img);
        div.appendChild(info);
        div.appendChild(removeBtn);
        container.appendChild(div);
      });

      calculateTotal(cart);
    }

    renderCart();

    // Checkout button
    document.getElementById("checkoutBtn").onclick = () => {
      if (cart.length === 0) {
        alert("Your cart is empty!");
        return;
      }

      let message = "I want to buy: ";
      cart.forEach(item => {
        message += `${item.name}, `;
      });

      window.open("https://instagram.com/nansik_retrokit", "_blank");
    };
  </script>

</body>
</html>
